<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:sans-serif;
padding:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#248bcf;
color:white;
border:none;
font-size:18px;
border-radius:10px;
}

</style>
</head>

<body>

<h2>Money Report</h2>

<input id="h" type="number" placeholder="Hours">

<input id="c" type="number" placeholder="Consumption">

<input id="t" type="number" placeholder="Tips">

<input id="f" type="number" placeholder="Fine">

<button onclick="submitData()">
SUBMIT
</button>

<script>

let tg =
window.Telegram.WebApp;

tg.expand();

function submitData(){

let h =
document
.getElementById("h")
.value || 0;

let c =
document
.getElementById("c")
.value || 0;

let t =
document
.getElementById("t")
.value || 0;

let f =
document
.getElementById("f")
.value || 0;

tg.sendData(
JSON.stringify({

type:"report",

h:h,

c:c,

t:t,

f:f

})
);

tg.close();
}

</script>

</body>
</html>
