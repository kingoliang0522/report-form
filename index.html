<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:-apple-system,sans-serif;
padding:15px;
margin:0;
background:#ffffff;
}

.input-group{
margin-bottom:12px;
}

input{
width:100%;
padding:12px;
box-sizing:border-box;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
background:#248bcf;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
margin-top:10px;
}

</style>
</head>

<body>

<h2>Money Report</h2>

<div class="input-group">
<input type="number" id="h" placeholder="Hourly">
</div>

<div class="input-group">
<input type="number" id="c" placeholder="Consumption">
</div>

<div class="input-group">
<input type="number" id="t" placeholder="Tips">
</div>

<div class="input-group">
<input type="number" id="f" placeholder="Fine">
</div>

<button id="submitBtn">
SUBMIT REPORT
</button>

<script>

let tg = window.Telegram.WebApp;

tg.expand();

document
.getElementById('submitBtn')
.addEventListener('click',function(){

let h =
parseFloat(
document.getElementById('h').value
) || 0;

let c =
parseFloat(
document.getElementById('c').value
) || 0;

let t =
parseFloat(
document.getElementById('t').value
) || 0;

let f =
parseFloat(
document.getElementById('f').value
) || 0;

tg.sendData(JSON.stringify({

type:"report",

h:h,
c:c,
t:t,
f:f

}));

tg.close();

});

</script>

</body>
</html>
