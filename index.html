<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; color: var(--tg-theme-hint-color); margin-bottom: 4px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); }
        button { width: 100%; padding: 15px; background: #248bcf; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="input-group">
        <label>Hourly Rate (小时费)</label>
        <input type="number" id="h" placeholder="0">
    </div>
    <div class="input-group">
        <label>Consumption (客户消费)</label>
        <input type="number" id="c" placeholder="0">
    </div>
    <div class="input-group">
        <label>Tips (小费)</label>
        <input type="number" id="t" placeholder="0">
    </div>
    <div class="input-group">
        <label>Fine (罚款)</label>
        <input type="number" id="f" placeholder="0">
    </div>
    
    <button onclick="submit()">SUBMIT REPORT</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function submit(){
            try {
                // 强制将空输入转化为数字 0，防止拼接格式断裂
                let h = parseFloat(document.getElementById('h').value) || 0;
                let c = parseFloat(document.getElementById('c').value) || 0;
                let t = parseFloat(document.getElementById('t').value) || 0;
                let f = parseFloat(document.getElementById('f').value) || 0;

                // 拼装符合你 GAS 脚本切分逻辑的字符串
                let dataString = h + " " + c + " " + t + " " + f;
                
                tg.sendData(dataString);
                tg.close();
            } catch (e) {
                alert("Error: " + e.message);
            }
        }
    </script>
</body>
</html>
